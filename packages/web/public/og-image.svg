<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#131d32"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow behind title -->
  <ellipse cx="600" cy="260" rx="500" ry="200" fill="#22c55e" opacity="0.03"/>

  <!-- Main title line 1 -->
  <text x="600" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    Migrate Strapi v3
  </text>

  <!-- Green arrow -->
  <g transform="translate(600, 280)" text-anchor="middle">
    <!-- Arrow shape -->
    <polygon points="-30,-28 10,-28 40,0 10,28 -30,28 0,0" fill="#22c55e"/>
    <!-- v5 text -->
    <text x="85" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="-2">v5</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="26" fill="#94a3b8" text-anchor="middle">
    Automated schema analysis, parity verification, and migration reporting.
  </text>
  <text x="600" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="26" fill="#94a3b8" text-anchor="middle">
    Know exactly what needs to change before you start.
  </text>

  <!-- Buttons -->
  <!-- Analyze button (green) -->
  <rect x="370" y="460" width="230" height="52" rx="8" fill="#22c55e"/>
  <text x="485" y="494" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="20" font-weight="600" fill="#052e16" text-anchor="middle">Analyze Your Schema</text>

  <!-- Learn More button (outline) -->
  <rect x="620" y="460" width="200" height="52" rx="8" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="720" y="494" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="20" font-weight="600" fill="#e2e8f0" text-anchor="middle">Learn More</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#0b1120"/>
  <text x="100" y="606" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="16" fill="#475569">strapishift.icjia.app</text>
  <text x="600" y="606" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Open Source · MIT License · ICJIA</text>
  <text x="1100" y="606" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="16" fill="#475569" text-anchor="end">14 Rules · 7 Categories · 4 Export Formats</text>
</svg>
